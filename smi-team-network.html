<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="referrer" content="no-referrer">
<title>Our Team — Shared Mobility Inc.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Semi+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════════════════════
   SHARED MOBILITY INC. — OUR TEAM
   Built from the homepage hero: copy on the left, ringed circles
   on the right, navy band, concentric arcs. Here the arcs aren't
   decoration — they're the orbits the diagram is laid out on.

   Two things are encoded at once, and they're independent:
     circle size        = chain of command
     distance to centre = how many practice areas the person spans
   ══════════════════════════════════════════════════════════════ */
.smi {
  --navy-deep: #0a3f6b;
  --navy:      #14588a;
  --navy-lift: #1d6ea4;
  --green:     #8cc63e;   /* SMI action green — the live thread, nothing else */
  --sky:       #7fc9ee;
  --card:      #edf5e3;
  --card-line: #cfe3b4;
  --card-ink:  #12507a;
  --card-body: #40606f;
  --moss:      #6a9c2f;

  --display: "Barlow Semi Condensed", "Barlow", system-ui, sans-serif;
  --body:    "Barlow", system-ui, sans-serif;

  position: relative;
  background: var(--navy);
  background-image: radial-gradient(115% 90% at 74% 44%, var(--navy-lift) 0%, var(--navy) 44%, var(--navy-deep) 100%);
  color: #fff;
  font-family: var(--body);
  padding: clamp(38px, 5vw, 76px) clamp(20px, 4vw, 56px);
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}
.smi *, .smi *::before, .smi *::after { box-sizing: border-box; }

/* ── Stage: the diagram, centred, nothing else ───────────── */
.smi-stage { max-width: 1320px; margin: 0 auto; }

/* ── Plot ────────────────────────────────────────────────── */
.smi-plot { position: relative; min-width: 0; }
/* overflow:visible lets the far arcs bleed past the diagram and fill
   the band; the section's overflow:hidden crops them at the edges. */
.smi-svg {
  display: block; width: 100%; max-width: 900px; height: auto;
  margin: 0 auto; touch-action: none; overflow: visible;
}
.smi-hint {
  position: relative; z-index: 1;
  margin: 8px 0 0; text-align: center;
  font-family: var(--display); font-weight: 600;
  font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
  color: rgba(255,255,255,.45);
}
.smi-sr {
  position: absolute; width: 1px; height: 1px; overflow: hidden;
  clip: rect(0 0 0 0); white-space: nowrap;
}

/* ── Orbits + sector arcs ────────────────────────────────── */
.smi-orbit { fill: none; stroke: #fff; opacity: 0.085; }
.smi-orbit.is-key { opacity: 0.14; }
.smi-orbit.is-bleed { opacity: 0.04; }
.smi-sector {
  font-family: var(--display); font-weight: 700;
  font-size: 13px; letter-spacing: 0.2em; text-transform: uppercase;
  fill: var(--sky); opacity: 0.85;
}
.smi-mesh line { stroke: #fff; stroke-width: 0.7; opacity: 0.1; transition: opacity 220ms; }
.smi-tie { stroke: var(--sky); stroke-width: 1; opacity: 0.3; fill: none;
  transition: stroke 200ms, stroke-width 200ms, opacity 220ms; }

/* ── People ──────────────────────────────────────────────── */
.smi-node { cursor: pointer; transform-box: view-box; transform-origin: 0px 0px; }
.smi-node:focus { outline: none; }
.smi-halo { fill: none; stroke: var(--green); stroke-width: 2; opacity: 0; transition: opacity 200ms; }
.smi-ring { fill: none; stroke: #fff; stroke-width: 2; stroke-opacity: 0.5;
  transition: stroke 200ms, stroke-opacity 200ms, stroke-width 200ms; }
.smi-disc { fill: var(--navy-deep); }
.smi-name {
  font-family: var(--display); font-weight: 700;
  letter-spacing: 0.06em; text-transform: uppercase;
  fill: #fff; text-anchor: middle; pointer-events: none;
  paint-order: stroke fill; stroke: var(--navy-deep); stroke-width: 4.5px;
  stroke-linejoin: round; stroke-opacity: 0.92;
}
.smi-role {
  font-family: var(--body); font-weight: 600; font-size: 9.5px; letter-spacing: 0.04em;
  fill: var(--sky); text-anchor: middle; pointer-events: none;
  paint-order: stroke fill; stroke: var(--navy-deep); stroke-width: 4px;
  stroke-linejoin: round; stroke-opacity: 0.92;
  opacity: 0; transition: opacity 180ms;
}
.smi-node:focus-visible .smi-halo, .smi-node:focus-visible .smi-role { opacity: 1; }
.smi-node:focus-visible .smi-ring { stroke: var(--green); stroke-opacity: 1; }

/* ── Program chips ───────────────────────────────────────── */
.smi-chip { cursor: pointer; }
.smi-chip rect {
  fill: #0d4874; fill-opacity: 0.85;
  stroke: var(--sky); stroke-opacity: 0.4; stroke-width: 1;
  transition: stroke 200ms, stroke-opacity 200ms, stroke-width 200ms;
}
.smi-chip-t {
  font-family: var(--display); font-weight: 700;
  font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase;
  fill: rgba(255,255,255,.88); dominant-baseline: middle; pointer-events: none;
  transition: fill 200ms;
}
.smi-chip-n {
  font-family: var(--body); font-weight: 600; font-size: 9.5px;
  fill: var(--sky); fill-opacity: .7; dominant-baseline: middle;
  text-anchor: end; pointer-events: none; transition: fill 200ms, fill-opacity 200ms;
}
.smi-chip:focus { outline: none; }
.smi-chip:focus-visible rect { stroke: var(--green); stroke-opacity: 1; stroke-width: 2; }

/* ── Live: everything recedes, the thread inks in green ──── */
.smi-svg.is-live .smi-mesh line { opacity: 0.03; }
.smi-svg.is-live .smi-tie { opacity: 0.07; }
.smi-svg.is-live .smi-node, .smi-svg.is-live .smi-chip { opacity: 0.2; transition: opacity 220ms; }
.smi-svg.is-live .smi-node.is-lit, .smi-svg.is-live .smi-chip.is-lit { opacity: 1; }
.smi-svg.is-live .smi-tie.is-lit { opacity: 1; stroke: var(--green); stroke-width: 2; }
.smi-node.is-src .smi-ring { stroke: var(--green); stroke-opacity: 1; stroke-width: 2.5; }
.smi-node.is-src .smi-halo { opacity: 1; }
.smi-node.is-src .smi-role { opacity: 1; }
.smi-node.is-peer .smi-ring { stroke: #fff; stroke-opacity: 1; }
.smi-chip.is-lit rect { stroke: var(--green); stroke-opacity: 1; stroke-width: 1.5; }
.smi-chip.is-lit .smi-chip-t { fill: #fff; }
.smi-chip.is-lit .smi-chip-n { fill: var(--green); fill-opacity: 1; }

/* ── Hover card: exists only while something is live ─────── */
.smi-card {
  position: absolute; top: 0; left: 0; width: 268px;
  background: var(--card); border-radius: 8px; padding: 16px;
  color: var(--card-body);
  box-shadow: 0 18px 44px rgba(4,26,44,.42);
  pointer-events: none; opacity: 0;
  transition: opacity 160ms;
  will-change: transform;
}
.smi-card.is-on { opacity: 1; }
.smi-card.is-pinned { pointer-events: auto; }
.smi-card-top { display: flex; gap: 11px; align-items: center; }
.smi-card-top img, .smi-card-top .smi-fb {
  width: 46px; height: 46px; border-radius: 50%; flex: none; object-fit: cover; background: #dbe7c6;
}
.smi-fb { display: grid; place-items: center; font-family: var(--display); font-weight: 700; font-size: 15px; color: var(--card-ink); }
.smi-c-name {
  margin: 0; font-family: var(--display); font-weight: 800;
  font-size: 17px; line-height: 1.05; letter-spacing: 0.01em;
  text-transform: uppercase; color: var(--card-ink);
}
.smi-c-name a { color: inherit; text-decoration: none; border-bottom: 2px solid var(--green); }
.smi-c-name a:hover { color: var(--moss); }
.smi-c-role { margin: 2px 0 0; font-size: 12px; font-weight: 600; color: var(--moss); }
.smi-c-bio { margin: 11px 0 0; font-size: 12.5px; line-height: 1.4; }
.smi-c-eyebrow {
  margin: 0 0 5px; font-family: var(--display); font-weight: 700;
  font-size: 10.5px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--moss);
}
.smi-label {
  margin: 13px 0 1px; padding-top: 10px; border-top: 1px solid var(--card-line);
  font-family: var(--display); font-weight: 700;
  font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--moss);
}
.smi-plist { list-style: none; margin: 0; padding: 0; }
.smi-plist li {
  display: flex; justify-content: space-between; align-items: baseline; gap: 8px;
  padding: 5px 0; border-bottom: 1px solid var(--card-line);
  font-family: var(--display); font-weight: 700;
  font-size: 12.5px; letter-spacing: 0.03em; text-transform: uppercase; color: var(--card-ink);
}
.smi-plist li:last-child { border-bottom: 0; }
.smi-plist span {
  font-family: var(--body); font-weight: 600; font-size: 10px;
  letter-spacing: 0; text-transform: none; color: #7d9a86; white-space: nowrap;
}
.smi-foot {
  margin: 10px 0 0; padding-top: 9px; border-top: 1px solid var(--card-line);
  font-size: 11.5px; font-weight: 500;
}
.smi-foot b { color: var(--moss); font-weight: 700; }

/* ── List (the layout under 760px) ───────────────────────── */
.smi-list { max-width: 760px; margin: 0 auto; }
.smi-row {
  display: grid; grid-template-columns: 54px minmax(0,1fr);
  gap: 14px; align-items: center;
  padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,.16);
}
.smi-row:first-child { border-top: 1px solid rgba(255,255,255,.16); }
.smi-row img, .smi-row .smi-fb { width: 54px; height: 54px; border-radius: 50%; object-fit: cover; background: #0d4874; }
.smi-row h3 {
  margin: 0; font-family: var(--display); font-weight: 700;
  font-size: 16px; letter-spacing: 0.05em; text-transform: uppercase; color: #fff;
}
.smi-row p { margin: 2px 0 7px; font-size: 12.5px; font-weight: 500; color: var(--sky); }
.smi-tags { display: flex; flex-wrap: wrap; gap: 5px; }
.smi-tags span {
  border: 1px solid rgba(127,201,238,.4); border-radius: 999px; padding: 3px 9px;
  font-family: var(--display); font-weight: 700;
  font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase;
  color: rgba(255,255,255,.85);
}

@media (prefers-reduced-motion: reduce) {
  .smi *, .smi *::before { transition-duration: 1ms !important; animation: none !important; }
}
</style>
</head>
<body style="margin:0">

<section class="smi" aria-labelledby="smi-h">

      <svg class="smi-svg" id="smi-svg" role="group"

      <p class="smi-sr" id="smi-sr" aria-live="polite"></p>
    </div>
  </div>

  <div class="smi-list" id="smi-list" hidden></div>
</section>

  const nodes = [], person = {};
  PEOPLE.forEach(p => {
    const rk = RANKS[p.rank];
    const n = { ...p, kind: "person", R: rk.r, font: rk.font,
      mass: 3.2 * Math.pow(rk.r / 36, 2), hw: rk.r + 7, top: rk.r + 6, bot: rk.r + 34,
      photo: PHOTOS[p.id], x: 0, y: 0, vx: 0, vy: 0, projects: [], peers: new Map() };
    person[p.id] = n; nodes.push(n);
  });

  const bucket = { 0: [], 1: [], 2: [] };
  PROJECTS.forEach((p, i) => bucket[p.area].push(i));
  const projects = PROJECTS.map((pr, i) => {
    const grp = bucket[pr.area], k = grp.indexOf(i);
    const ang = (AREAS[pr.area].angle + (k - (grp.length - 1) / 2) * SPREAD) * Math.PI / 180;
    const rr = R_PROJ + (k % 2 ? STAGGER : 0);
    const n = { id: "p" + i, kind: "project", name: pr.name, area: pr.area, mass: 1,
      members: pr.people, ang, ax: Math.cos(ang) * rr, ay: Math.sin(ang) * rr,
      w: 0, x: 0, y: 0, vx: 0, vy: 0 };
    pr.people.forEach(id => person[id].projects.push(n));
    nodes.push(n); return n;
  });

  PROJECTS.forEach(pr => pr.people.forEach(a => pr.people.forEach(b => {
    if (a === b) return;
    if (!person[a].peers.has(b)) person[a].peers.set(b, []);
    person[a].peers.get(b).push(pr.name);
  })));

  const ties = [];
  projects.forEach(pn => pn.members.forEach(id => ties.push({ a: person[id], b: pn })));
  const mesh = [];
  for (let i = 0; i < PEOPLE.length; i++)
    for (let j = i + 1; j < PEOPLE.length; j++)
      mesh.push({ a: person[PEOPLE[i].id], b: person[PEOPLE[j].id] });

  /* Anchor each person to the mean direction of their own work.
     All your programs in one practice area? Your vectors agree, and
     you sit out on that rim. Spread across areas? They cancel, and
     you land in the middle. */
  PEOPLE.forEach(p => {
    const n = person[p.id];
    let wx = 0, wy = 0;
    n.projects.forEach(pr => { wx += Math.cos(pr.ang); wy += Math.sin(pr.ang); });
    wx /= n.projects.length || 1; wy /= n.projects.length || 1;
    n.areas = [...new Set(n.projects.map(pr => pr.area))].sort();
    n.ax = wx * R_PPL; n.ay = wy * R_PPL;
  });

  /* ═══════════════════════════════════════════════════════════
     3 · BUILD
     ═══════════════════════════════════════════════════════════ */

  const svg = document.getElementById("smi-svg");
  const defs = el("defs");
  const gOrbit = el("g"), gSector = el("g"), gMesh = el("g", { class: "smi-mesh" });
  const gTies = el("g"), gProj = el("g"), gPeople = el("g");
  svg.append(defs, gOrbit, gSector, gMesh, gTies, gProj, gPeople);

  // The two orbits that carry meaning, plus far arcs that bleed out
  // past the diagram to fill the band — the hero's radiating motif.
  [[R_PPL, "is-key"], [R_PROJ, "is-key"], [R_PROJ + STAGGER, ""], [R_LABEL, ""],
   [560, "is-bleed"], [700, "is-bleed"], [870, "is-bleed"], [1070, "is-bleed"]]
    .forEach(([r, mod]) => gOrbit.appendChild(el("circle", { class: "smi-orbit " + mod, r })));

  AREAS.forEach((area, i) => {
    const c = area.angle, half = 46;
    const lower = ((c % 360) + 360) % 360 < 180;          // flip so it never reads upside down
    const [a1, a2, sweep] = lower ? [c + half, c - half, 0] : [c - half, c + half, 1];
    const pt = a => [Math.cos(a * Math.PI / 180) * R_LABEL, Math.sin(a * Math.PI / 180) * R_LABEL];
    const [x1, y1] = pt(a1), [x2, y2] = pt(a2);
    const id = "smi-arc-" + i;
    defs.appendChild(el("path", { id, fill: "none",
      d: `M ${x1.toFixed(1)} ${y1.toFixed(1)} A ${R_LABEL} ${R_LABEL} 0 0 ${sweep} ${x2.toFixed(1)} ${y2.toFixed(1)}` }));
    const t = el("text", { class: "smi-sector", dy: lower ? 13 : -7 });
    const tp = el("textPath", { startOffset: "50%", "text-anchor": "middle" });
    tp.setAttribute("href", "#" + id);
    tp.setAttributeNS("http://www.w3.org/1999/xlink", "xlink:href", "#" + id);
    tp.textContent = area.name;
    t.appendChild(tp); gSector.appendChild(t);
  });

  mesh.forEach(m => { m.node = el("line"); gMesh.appendChild(m.node); });
  ties.forEach(t => { t.node = el("line", { class: "smi-tie" }); gTies.appendChild(t.node); });

  projects.forEach(pn => {
    const wrap = el("g");
    const g = el("g", { class: "smi-chip", tabindex: "0", role: "button" });
    g.setAttribute("aria-label", `${pn.name}. ${AREAS[pn.area].name}. ${pn.members.length} people.`);
    const rect = el("rect", { rx: "11", y: "-11", height: "22" });
    const label = el("text", { class: "smi-chip-t", y: "0.5", "text-anchor": "start" });
    label.textContent = pn.name;
    const count = el("text", { class: "smi-chip-n", y: "0.5" });
    count.textContent = pn.members.length;
    g.append(rect, label, count);
    wrap.appendChild(g); gProj.appendChild(wrap);
    Object.assign(pn, { wrap, g, rect, label, count });
  });

  PEOPLE.forEach(p => {
    const n = person[p.id], R = n.R;
    const wrap = el("g");
    const g = el("g", { class: "smi-node", tabindex: "0", role: "button" });
    g.setAttribute("aria-label",
      `${p.name}, ${p.role}. ${n.projects.length} programs, works with ${n.peers.size} people.`);

    const cid = "smi-clip-" + p.id;
    const clip = el("clipPath", { id: cid });
    clip.appendChild(el("circle", { r: R }));
    defs.appendChild(clip);

    const halo = el("circle", { class: "smi-halo", r: R + 6 });
    const disc = el("circle", { class: "smi-disc", r: R });
    const img = el("image", { x: -R, y: -R, width: R * 2, height: R * 2,
      "clip-path": `url(#${cid})`, preserveAspectRatio: "xMidYMid slice" });
    if (n.photo) {
      img.setAttribute("href", n.photo);
      img.setAttributeNS("http://www.w3.org/1999/xlink", "xlink:href", n.photo);
    }
    const init = el("text", { "text-anchor": "middle", y: R * 0.2, opacity: n.photo ? "0" : "1",
      style: `font-family:var(--display);font-weight:700;font-size:${(R * 0.6).toFixed(0)}px;fill:#fff` });
    init.textContent = initials(p.name);
    const ring = el("circle", { class: "smi-ring", r: R });   // over the photo, so the edge stays crisp

    const nm = el("text", { class: "smi-name", y: R + 19, "font-size": n.font });
    nm.textContent = p.name;
    const rl = el("text", { class: "smi-role", y: R + 31 });
    rl.textContent = p.role;

    g.append(halo, disc, img, init, ring, nm, rl);
    wrap.appendChild(g); gPeople.appendChild(wrap);
    Object.assign(n, { wrap, g, img, init, ring, nmEl: nm });
  });

  // Measure the real type, then size every collision box from it.
  function measure() {
    projects.forEach(pn => {
      let tw = 0; try { tw = pn.label.getComputedTextLength(); } catch (e) {}
      if (!tw) tw = pn.name.length * 6.2;
      pn.w = Math.round(tw + 40);
      pn.rect.setAttribute("x", -pn.w / 2); pn.rect.setAttribute("width", pn.w);
      pn.label.setAttribute("x", -pn.w / 2 + 12);
      pn.count.setAttribute("x", pn.w / 2 - 11);
    });
    PEOPLE.forEach(p => {
      const n = person[p.id];
      let tw = 0; try { tw = n.nmEl.getComputedTextLength(); } catch (e) {}
      if (!tw) tw = p.name.length * n.font * 0.56;
      n.hw = Math.max(n.R, tw / 2) + 7;
    });
  }
  measure();

  /* ═══════════════════════════════════════════════════════════
     4 · LAYOUT
     ═══════════════════════════════════════════════════════════ */

  const K_REP = 7000, MAX_REP = 6;
  const S_TIE = 0.012, REST_TIE = 150;
  const S_MESH = 0.002, REST_MESH = 220;
  const S_ANCH_PROJ = 0.10, S_ANCH_PERSON = 0.06, DAMP = 0.82;

  const box = n => n.kind === "person"
    ? { x0: n.x - n.hw, x1: n.x + n.hw, y0: n.y - n.top, y1: n.y + n.bot }
    : { x0: n.x - n.w / 2 - 5, x1: n.x + n.w / 2 + 5, y0: n.y - 13, y1: n.y + 13 };

  function separate() {
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const a = nodes[i], b = nodes[j], A = box(a), B = box(b);
        const ox = Math.min(A.x1, B.x1) - Math.max(A.x0, B.x0);
        const oy = Math.min(A.y1, B.y1) - Math.max(A.y0, B.y0);
        if (ox <= 0 || oy <= 0) continue;
        const af = a.fixed ? 0 : (b.fixed ? 1 : 0.5), bf = b.fixed ? 0 : (a.fixed ? 1 : 0.5);
        if (ox < oy) { const s = (ox + 0.5) * (a.x <= b.x ? 1 : -1); a.x -= s * af; b.x += s * bf; }
        else         { const s = (oy + 0.5) * (a.y <= b.y ? 1 : -1); a.y -= s * af; b.y += s * bf; }
      }
    }
  }

  function tick(alpha) {
    for (let i = 0; i < nodes.length; i++) {
      const a = nodes[i];
      for (let j = i + 1; j < nodes.length; j++) {
        const b = nodes[j];
        let dx = b.x - a.x, dy = b.y - a.y, d2 = dx * dx + dy * dy;
        if (d2 < 0.01) { dx = Math.random() - .5; dy = Math.random() - .5; d2 = .01; }
        const d = Math.sqrt(d2), f = Math.min(K_REP * a.mass * b.mass / d2, MAX_REP);
        const fx = dx / d * f, fy = dy / d * f;
        a.vx -= fx / a.mass; a.vy -= fy / a.mass;
        b.vx += fx / b.mass; b.vy += fy / b.mass;
      }
    }
    const sp = (l, k, rest) => {
      const dx = l.b.x - l.a.x, dy = l.b.y - l.a.y, d = Math.hypot(dx, dy) || .01;
      const f = k * (d - rest), fx = dx / d * f, fy = dy / d * f;
      l.a.vx += fx / l.a.mass; l.a.vy += fy / l.a.mass;
      l.b.vx -= fx / l.b.mass; l.b.vy -= fy / l.b.mass;
    };
    ties.forEach(l => sp(l, S_TIE, REST_TIE));
    mesh.forEach(l => sp(l, S_MESH, REST_MESH));
    projects.forEach(p => { p.vx += (p.ax - p.x) * S_ANCH_PROJ; p.vy += (p.ay - p.y) * S_ANCH_PROJ; });
    PEOPLE.forEach(p => { const n = person[p.id];
      n.vx += (n.ax - n.x) * S_ANCH_PERSON; n.vy += (n.ay - n.y) * S_ANCH_PERSON; });
    nodes.forEach(n => {
      if (n.fixed) { n.vx = n.vy = 0; return; }
      n.vx *= DAMP; n.vy *= DAMP; n.x += n.vx * alpha; n.y += n.vy * alpha;
    });
    separate();
  }

  function settle() {
    nodes.forEach(n => { n.x = n.ax; n.y = n.ay; n.vx = n.vy = 0; });
    let alpha = 1;
    for (let i = 0; i < 1100; i++) { tick(alpha); alpha *= 0.995; }
    for (let i = 0; i < 100; i++) separate();
  }

  function paint() {
    nodes.forEach(n => n.wrap.setAttribute("transform", `translate(${n.x.toFixed(1)} ${n.y.toFixed(1)})`));
    const line = l => {
      l.node.setAttribute("x1", l.a.x.toFixed(1)); l.node.setAttribute("y1", l.a.y.toFixed(1));
      l.node.setAttribute("x2", l.b.x.toFixed(1)); l.node.setAttribute("y2", l.b.y.toFixed(1));
    };
    mesh.forEach(line); ties.forEach(line);
  }

  function fit() {
    let x0 = Infinity, y0 = Infinity, x1 = -Infinity, y1 = -Infinity;
    nodes.forEach(n => { const b = box(n);
      x0 = Math.min(x0, b.x0); x1 = Math.max(x1, b.x1);
      y0 = Math.min(y0, b.y0); y1 = Math.max(y1, b.y1); });
    const L = R_LABEL + 22;   // keep the sector arcs in frame
    x0 = Math.min(x0, -L); x1 = Math.max(x1, L);
    y0 = Math.min(y0, -L); y1 = Math.max(y1, L);
    const pad = 6, w = x1 - x0 + pad * 2, h = y1 - y0 + pad * 2;
    svg.setAttribute("viewBox", `${(x0-pad).toFixed(1)} ${(y0-pad).toFixed(1)} ${w.toFixed(1)} ${h.toFixed(1)}`);
    svg.style.aspectRatio = `${w.toFixed(1)} / ${h.toFixed(1)}`;
  }

  const relayout = () => { measure(); settle(); paint(); fit(); };
  relayout();

  /* ═══════════════════════════════════════════════════════════
     5 · THE GREEN THREAD + the card
     ═══════════════════════════════════════════════════════════ */

  const plot = document.getElementById("smi-plot");
  const card = document.getElementById("smi-card");
  const sr = document.getElementById("smi-sr");
  let hovered = null, pinned = null;

  const face = (p, cls = "") => p.photo
    ? `<img src="${p.photo}" alt="" class="${cls}">`
    : `<div class="smi-fb ${cls}">${initials(p.name)}</div>`;

  function toScreen(x, y) {
    const r = svg.getBoundingClientRect(), pr = plot.getBoundingClientRect(), vb = svg.viewBox.baseVal;
    const s = Math.min(r.width / vb.width, r.height / vb.height);
    return { x: (x - vb.x) * s + (r.left - pr.left) + (r.width - vb.width * s) / 2,
             y: (y - vb.y) * s + (r.top - pr.top) + (r.height - vb.height * s) / 2, s,
             top: r.top - pr.top, h: r.height };
  }

  function placeCard(n) {
    const p = toScreen(n.x, n.y);
    const cw = card.offsetWidth, ch = card.offsetHeight;
    const reach = (n.kind === "person" ? n.R : n.w / 2) * p.s + 16;
    let x = p.x + reach;
    if (x + cw > plot.clientWidth - 4) x = p.x - reach - cw;      // flip to the other side
    x = Math.max(4, Math.min(x, plot.clientWidth - cw - 4));
    let y = Math.max(p.top + 4, Math.min(p.y - ch / 2, p.top + p.h - ch - 4));
    card.style.transform = `translate(${Math.round(x)}px, ${Math.round(y)}px)`;
  }

  function render() {
    const a = hovered || pinned;
    svg.classList.toggle("is-live", !!a);
    nodes.forEach(n => n.g.classList.remove("is-lit", "is-src", "is-peer"));
    ties.forEach(t => t.node.classList.remove("is-lit"));

    if (!a) {
      card.classList.remove("is-on", "is-pinned");
      card.setAttribute("aria-hidden", "true");
      return;
    }

    if (a.kind === "person") {
      a.g.classList.add("is-lit", "is-src");
      a.projects.forEach(pn => pn.g.classList.add("is-lit"));
      ties.forEach(t => {
        if (t.a === a) { t.node.classList.add("is-lit"); return; }
        if (a.projects.includes(t.b)) { t.node.classList.add("is-lit"); t.a.g.classList.add("is-lit", "is-peer"); }
      });
      const where = a.areas.length === 3 ? "Works across all three practice areas"
        : a.areas.length === 2 ? "Across " + a.areas.map(i => AREAS[i].name).join(" + ")
        : AREAS[a.areas[0]].name;
      card.innerHTML = `
        <p class="smi-c-eyebrow">${esc(where)}</p>
        <div class="smi-card-top">${face(a)}
          <div><h3 class="smi-c-name">${a.li ? `<a href="${esc(a.li)}" target="_blank" rel="noopener">${esc(a.name)}</a>` : esc(a.name)}</h3>
          <p class="smi-c-role">${esc(a.role)}</p></div>
        </div>
        <p class="smi-c-bio">${esc(a.bio)}</p>
        <p class="smi-label">Programs · ${a.projects.length}</p>
        <ul class="smi-plist">${a.projects.map(pn =>
          `<li>${esc(pn.name)}<span>${pn.members.length} on it</span></li>`).join("")}</ul>
        <p class="smi-foot">Works with <b>${a.peers.size}</b> of the team — traced in green.</p>`;
      sr.textContent = `${a.name}, ${a.role}. ${a.projects.length} programs.`;
    } else {
      a.g.classList.add("is-lit");
      ties.forEach(t => { if (t.b === a) { t.node.classList.add("is-lit"); t.a.g.classList.add("is-lit", "is-peer"); } });
      card.innerHTML = `
        <p class="smi-c-eyebrow">${esc(AREAS[a.area].name)}</p>
        <h3 class="smi-c-name">${esc(a.name)}</h3>
        <p class="smi-label">On this program · ${a.members.length}</p>
        <ul class="smi-plist">${a.members.map(id =>
          `<li>${esc(byId[id].name)}<span>${esc(byId[id].role)}</span></li>`).join("")}</ul>`;
      sr.textContent = `${a.name}, ${a.members.length} people.`;
    }
    card.classList.add("is-on");
    card.classList.toggle("is-pinned", !hovered && !!pinned);
    card.setAttribute("aria-hidden", "false");
    placeCard(a);
  }

  let drag = null;
  const toLocal = e => {
    const r = svg.getBoundingClientRect(), vb = svg.viewBox.baseVal;
    const s = Math.min(r.width / vb.width, r.height / vb.height);
    return { x: (e.clientX - r.left - (r.width - vb.width * s) / 2) / s + vb.x,
             y: (e.clientY - r.top - (r.height - vb.height * s) / 2) / s + vb.y };
  };

  nodes.forEach(n => {
    const g = n.g;
    g.addEventListener("pointerenter", () => { hovered = n; render(); });
    g.addEventListener("pointerleave", () => { if (hovered === n) { hovered = null; render(); } });
    g.addEventListener("focus", () => { hovered = n; render(); });
    g.addEventListener("blur", () => { if (hovered === n) { hovered = null; render(); } });
    g.addEventListener("keydown", e => {
      if (e.key === "Enter" || e.key === " ") { e.preventDefault(); pinned = pinned === n ? null : n; render(); }
    });
    g.addEventListener("pointerdown", e => {
      if (e.button !== 0) return;
      const p = toLocal(e);
      drag = { n, moved: false, ox: n.x - p.x, oy: n.y - p.y };
      n.fixed = true; g.setPointerCapture(e.pointerId);
    });
    g.addEventListener("pointermove", e => {
      if (!drag || drag.n !== n) return;
      const p = toLocal(e), nx = p.x + drag.ox, ny = p.y + drag.oy;
      if (Math.hypot(nx - n.x, ny - n.y) > 1.5) drag.moved = true;
      n.x = nx; n.y = ny;
      for (let i = 0; i < 3; i++) tick(0.5);
      n.x = nx; n.y = ny; paint();
      if (hovered === n || pinned === n) placeCard(n);
    });
    g.addEventListener("pointerup", () => {
      if (!drag || drag.n !== n) return;
      n.fixed = false;
      if (!drag.moved) { pinned = pinned === n ? null : n; render(); }
      else { let f = 0, a = 0.9;
        (function relax() { if (f++ > 80) return; tick(a); a *= 0.96; paint();
          if (hovered === n || pinned === n) placeCard(n); requestAnimationFrame(relax); })(); }
      drag = null;
    });
  });

  svg.addEventListener("pointerdown", e => { if (e.target === svg) { pinned = null; render(); } });
  document.getElementById("smi-stage").addEventListener("keydown", e => {
    if (e.key !== "ArrowRight" && e.key !== "ArrowLeft") return;
    e.preventDefault();
    const cur = hovered || pinned;
    let i = cur && cur.kind === "person" ? PEOPLE.findIndex(p => p.id === cur.id) : -1;
    i = (i + (e.key === "ArrowRight" ? 1 : -1) + PEOPLE.length) % PEOPLE.length;
    person[PEOPLE[i].id].g.focus();
  });

  /* ═══════════════════════════════════════════════════════════
     6 · LIST · BREAKPOINT
     ═══════════════════════════════════════════════════════════ */

  const list = document.getElementById("smi-list");
  list.innerHTML = PEOPLE.map(p => `<div class="smi-row">${face(p)}
    <div><h3>${esc(p.name)}</h3><p>${esc(p.role)}</p>
    <div class="smi-tags">${person[p.id].projects.map(pn => `<span>${esc(pn.name)}</span>`).join("")}</div></div>
  </div>`).join("");

  const stage = document.getElementById("smi-stage");
  const mq = window.matchMedia("(max-width: 760px)");
  const apply = () => {
    const small = mq.matches;
    stage.hidden = small; list.hidden = !small;
    if (!small) relayout();
  };
  apply();
  mq.addEventListener("change", apply);
  addEventListener("resize", () => { const a = hovered || pinned; if (a && !stage.hidden) placeCard(a); });
  if (document.fonts && document.fonts.ready)
    document.fonts.ready.then(() => { if (!stage.hidden) relayout(); });

  /* ═══════════════════════════════════════════════════════════
     7 · REVEAL — orbits, weave, then the people by seniority
     ═══════════════════════════════════════════════════════════ */

  if (!window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
    const E = "cubic-bezier(.22,1,.36,1)";
    const go = (node, frames, d, delay) => node.animate(frames, { duration: d, delay, easing: E, fill: "backwards" });
    const orbitOpacity = c => c.classList.contains("is-key") ? .14
      : c.classList.contains("is-bleed") ? .04 : .085;
    [...gOrbit.children].forEach((c, i) => go(c, [{ opacity: 0 }, { opacity: orbitOpacity(c) }], 800, i * 70));
    [...gSector.children].forEach((c, i) => go(c, [{ opacity: 0 }, { opacity: .85 }], 600, 320 + i * 110));
    mesh.forEach((m, i) => go(m.node, [{ opacity: 0 }, { opacity: .1 }], 700, 120 + i * 6));
    ties.forEach((t, i) => go(t.node, [{ opacity: 0 }, { opacity: .3 }], 500, 420 + i * 8));
    PEOPLE.slice().sort((a, b) => a.rank - b.rank).forEach((p, i) =>
      go(person[p.id].g, [{ opacity: 0, transform: "scale(.7)" }, { opacity: 1, transform: "scale(1)" }], 640, 180 + i * 60));
    projects.forEach((pn, i) => go(pn.g, [{ opacity: 0 }, { opacity: 1 }], 460, 680 + i * 34));
  }
})();
</script>
