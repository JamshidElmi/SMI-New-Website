<section id="contact" class="section contact-ct">
  <div class="wrap">
    <div class="contact-ct-head">
      <span class="contact-ct-eyebrow">Get in Touch</span>
      <h2>Contact Us</h2>
      <p>Have a question or want to work together? We'd love to hear from you.</p>
    </div>
    <div class="contact-ct-body">
      <div class="contact-ct-info">
        <div class="contact-ct-item">
          <i class="fa-solid fa-location-dot"></i>
          <div>
            <h4>Address</h4>
            <p>640 Ellicott Street #441 Buffalo, NY 14203</p>
          </div>
        </div>
        <div class="contact-ct-item">
          <i class="fa-solid fa-envelope"></i>
          <div>
            <h4>Email</h4>
            <a href="mailto:Info@sharedmobility.org">Info@sharedmobility.org</a>
          </div>
        </div>
      </div>
      <form class="form contact-ct-form">
        <input aria-label="First Name" placeholder="First Name *">
        <input aria-label="Last Name" placeholder="Last Name *">
        <input aria-label="Email" placeholder="Email *" style="grid-column:1/-1">
        <textarea aria-label="How can we help?" placeholder="How can we help?"></textarea>
        <button class="btn" type="button">Submit</button>
      </form>
    </div>
  </div>
</section>
