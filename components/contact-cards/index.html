<section id="contact" class="section contact-cd">
  <div class="wrap">
    <div class="contact-cd-head">
      <span class="contact-cd-eyebrow">Get in Touch</span>
      <h2>Contact Us</h2>
    </div>
    <div class="contact-cd-grid">
      <div class="contact-cd-card">
        <div class="contact-cd-icon"><i class="fa-solid fa-location-dot"></i></div>
        <h3>Visit Us</h3>
        <p>640 Ellicott Street #441<br>Buffalo, NY 14203</p>
      </div>
      <div class="contact-cd-card">
        <div class="contact-cd-icon"><i class="fa-solid fa-envelope"></i></div>
        <h3>Email Us</h3>
        <a href="mailto:Info@sharedmobility.org">Info@sharedmobility.org</a>
      </div>
      <div class="contact-cd-card">
        <div class="contact-cd-icon"><i class="fa-solid fa-comments"></i></div>
        <h3>Let's Talk</h3>
        <p>Fill out the form and our team will get back to you within 24 hours.</p>
      </div>
    </div>
    <form class="form contact-cd-form">
      <input aria-label="First Name" placeholder="First Name *">
      <input aria-label="Last Name" placeholder="Last Name *">
      <input aria-label="Email" placeholder="Email *" style="grid-column:1/-1">
      <textarea aria-label="How can we help?" placeholder="How can we help?"></textarea>
      <button class="btn" type="button">Submit</button>
    </form>
  </div>
</section>
