<section id="contact" class="section contact-sp">
  <div class="wrap contact-sp-grid">
    <div class="contact-sp-info">
      <span class="contact-sp-eyebrow">Get in Touch</span>
      <h2>Contact Us</h2>
      <p>640 Ellicott Street #441 Buffalo, NY 14203</p>
      <a href="mailto:Info@sharedmobility.org" class="contact-sp-email">Info@sharedmobility.org</a>
      <div class="contact-sp-social">
        <a href="#" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
        <a href="#" aria-label="Facebook"><i class="fa-brands fa-facebook-f"></i></a>
        <a href="#" aria-label="LinkedIn"><i class="fa-brands fa-linkedin-in"></i></a>
      </div>
    </div>
    <form class="form contact-sp-form">
      <input aria-label="First Name" placeholder="First Name *">
      <input aria-label="Last Name" placeholder="Last Name *">
      <input aria-label="Email" placeholder="Email *" style="grid-column:1/-1">
      <textarea aria-label="How can we help?" placeholder="How can we help?"></textarea>
      <button class="btn" type="button">Submit</button>
    </form>
  </div>
</section>
